name: Eden 2 CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      env:
        MONGO_URL: mongodb://localhost:27017  # Mock or use a service container in future
        JWT_SECRET: test_secret
      run: |
        # Running a simple discovery first to ensure tests are collectable
        pytest --collect-only

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/frontend

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: "18"
        cache: "npm"
        cache-dependency-path: frontend/frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npx craco test --watchAll=false --ci --passWithNoTests
      env:
        CI: true

    - name: Build
      run: npx craco build
      env:
        CI: true
        DISABLE_ESLINT_PLUGIN: true
