name: Eden 2 CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/backend

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-asyncio httpx
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      env:
        MONGO_URL: mongodb://localhost:27017
        JWT_SECRET_KEY: ci-test-secret-not-for-production
        ENCRYPTION_KEY: Y2ktdGVzdC1lbmNyeXB0aW9uLWtleS1ub3QtZm9yLXByb2Q=
        ENVIRONMENT: test
      run: pytest -x --tb=short

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: frontend/frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npx vitest run
      env:
        CI: true

    - name: Build
      run: npx vite build
      env:
        CI: true
